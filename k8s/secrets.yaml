# This is a template file. DO NOT commit actual secrets to version control.
# Create the actual secret using: kubectl create secret generic loan-wizard-secrets --from-literal=database-url=... etc.

apiVersion: v1
kind: Secret
metadata:
  name: loan-wizard-secrets
type: Opaque
data:
  # Base64 encoded values - generate using: echo -n 'value' | base64
  database-url: <base64-encoded-database-url>
  redis-url: <base64-encoded-redis-url>
  openai-api-key: <base64-encoded-openai-api-key>
  jwt-secret-key: <base64-encoded-jwt-secret-key>

---
# Example of how to create the secret:
#
# kubectl create secret generic loan-wizard-secrets \
#   --from-literal=database-url='postgresql+asyncpg://user:password@postgres:5432/loanwizard' \
#   --from-literal=redis-url='redis://redis:6379/0' \
#   --from-literal=openai-api-key='sk-your-openai-api-key' \
#   --from-literal=jwt-secret-key='your-super-secure-jwt-secret-key'