apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loan-wizard-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - loan-wizard.example.com
    secretName: loan-wizard-tls
  rules:
  - host: loan-wizard.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: loan-wizard-backend
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: loan-wizard-frontend
            port:
              number: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loan-wizard-backend-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "50"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.loan-wizard.example.com
    secretName: loan-wizard-api-tls
  rules:
  - host: api.loan-wizard.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: loan-wizard-backend
            port:
              number: 80